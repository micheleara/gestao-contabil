spring:
  application:
    name: gestao-contabil-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    topics:
      lancamento-request: encargos.lancamento-contabil
      lancamento-response: encargos.contabil-confirmacao
  boot:
    admin:
      client:
        enabled: false